<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="Sunchain dashboard preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0e1a"/>
      <stop offset="100%" stop-color="#111735"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7cf0ff"/>
      <stop offset="100%" stop-color="#8b5bff"/>
    </linearGradient>
    <style>
      .title { font: 700 52px Inter, Arial, sans-serif; fill: #e6ecff; }
      .subtitle { font: 400 24px Inter, Arial, sans-serif; fill: #9aa9d6; }
      .eyebrow { font: 600 22px Inter, Arial, sans-serif; fill: #7cf0ff; }
      .h3 { font: 600 28px Inter, Arial, sans-serif; fill: #e6ecff; }
      .text { font: 400 18px Inter, Arial, sans-serif; fill: #9aa9d6; }
      .strong { font: 700 36px Inter, Arial, sans-serif; fill: #e6ecff; }
      .mono { font: 500 16px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #7cf0ff; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="40" y="40" width="1520" height="920" rx="24" fill="none" stroke="#283050"/>

  <text x="90" y="110" class="eyebrow">Sunchain L1 • Real-time Explorer</text>
  <text x="90" y="180" class="title">Unified view of Sunchain in real time.</text>
  <text x="90" y="225" class="subtitle">Live blocks, validator health, and staking — all in one Solana-style dashboard.</text>

  <rect x="1030" y="80" width="490" height="220" rx="18" fill="#171c34" stroke="#2b3359"/>
  <circle cx="1070" cy="120" r="8" fill="#29f089"/>
  <text x="1090" y="126" class="text" fill="#e6ecff">Streaming (simulated)</text>
  <text x="1060" y="170" class="text">Latest Block</text>
  <text x="1060" y="220" class="strong">#982559</text>
  <text x="1060" y="252" class="mono">f3a8c9d1ae...8c11ab</text>

  <rect x="80" y="320" width="850" height="380" rx="18" fill="#13172a" stroke="#2b3359"/>
  <text x="110" y="365" class="h3">Live Block Feed</text>
  <g fill="#1b2140">
    <rect x="110" y="390" width="790" height="38" rx="8"/>
    <rect x="110" y="437" width="790" height="38" rx="8"/>
    <rect x="110" y="484" width="790" height="38" rx="8"/>
    <rect x="110" y="531" width="790" height="38" rx="8"/>
    <rect x="110" y="578" width="790" height="38" rx="8"/>
    <rect x="110" y="625" width="790" height="38" rx="8"/>
  </g>
  <text x="130" y="414" class="text" fill="#e6ecff">Block #982559 — 1432 txns • Helios</text>
  <text x="130" y="461" class="text">Block #982558 — 1511 txns • Nova</text>
  <text x="130" y="508" class="text">Block #982557 — 1388 txns • Lumen</text>
  <text x="130" y="555" class="text">Block #982556 — 1490 txns • Pulse</text>
  <text x="130" y="602" class="text">Block #982555 — 1417 txns • Vertex</text>
  <text x="130" y="649" class="text">Block #982554 — 1528 txns • Helios</text>

  <rect x="960" y="320" width="560" height="380" rx="18" fill="#13172a" stroke="#2b3359"/>
  <text x="990" y="365" class="h3">Network Health</text>
  <rect x="990" y="390" width="500" height="84" rx="10" fill="#1b2140"/>
  <rect x="990" y="488" width="500" height="84" rx="10" fill="#1b2140"/>
  <rect x="990" y="586" width="500" height="84" rx="10" fill="#1b2140"/>
  <text x="1010" y="420" class="text">Current TPS</text>
  <text x="1010" y="452" class="h3" fill="#7cf0ff">5,212</text>
  <text x="1010" y="518" class="text">Active Validators</text>
  <text x="1010" y="550" class="h3" fill="#7cf0ff">146</text>
  <text x="1010" y="616" class="text">Epoch Progress</text>
  <text x="1010" y="648" class="h3" fill="#7cf0ff">68.4%</text>

  <rect x="80" y="740" width="1440" height="200" rx="18" fill="#13172a" stroke="#2b3359"/>
  <text x="110" y="785" class="h3">Staking</text>
  <text x="110" y="815" class="text">Connect your wallet to delegate SUNC to a validator and earn rewards.</text>
  <rect x="110" y="848" width="230" height="52" rx="12" fill="url(#cta)"/>
  <text x="146" y="881" class="text" fill="#0b0e1a" font-weight="700">Connect Wallet</text>

  <rect x="700" y="790" width="790" height="132" rx="14" fill="#171c34"/>
  <text x="730" y="830" class="text" fill="#e6ecff">Validator: Helios Labs — 0% commission</text>
  <text x="730" y="865" class="text" fill="#e6ecff">Amount (SUNC): 250</text>
  <rect x="1260" y="845" width="200" height="56" rx="12" fill="#8b5bff"/>
  <text x="1330" y="880" class="text" fill="#ffffff">Stake</text>
</svg>
